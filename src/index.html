<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/main.js" defer></script>
    <style>
      .logo.vanilla:hover {
        filter: drop-shadow(0 0 2em #ffe21c);
      }
    </style>
  </head>

  <body>
    <div class="top-strip">
      <a href="https://tauri.app" target="_blank">
        <img src="/assets/tauri.svg" class="logo tauri" alt="Tauri logo" />
      </a>
    </div>
    <div class="container">
      <h1>Welcome to RustyShow!</h1>
      <form class="row" id="input-form">
        <input id="input-input" placeholder="Enter an input..." />
        <button type="submit">Add</button>
      </form>

      <div id="content" class="main-pane">
        <div id="input-column" class="content-pane">
          <ul id="input-list">
            <li></li>
          </ul>
        </div>
        <button id="process-btn" class="process-button" type="submit">=></button>
        <div id="output-column" class="content-pane">
          <ul id="output-list">
          </ul>
        </div>
      </div>

  </body>
</html>
